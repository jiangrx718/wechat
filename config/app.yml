debug: true
app: wechat-app
server:
  addr: ":8080"
log:
  development: true
  level: debug
  disable_sentry: true
  outputs:
    - stdout
    - ./logs/wechat-app.log
tools:
  dialect: mysql
  dsn: root:123456@tcp(127.0.0.1:3306)/wechat?charset=utf8mb4&parseTime=True&loc=Local
demo:
  switch: false
  cron: "*/1 * * * *"
# 微信小程序内容安全检测（security.imgSecCheck）所需凭证
# 也可用环境变量覆盖：WECHAT_APPID / WECHAT_SECRET（viper 已开启 .→_ 替换）
wechat:
  appid: "your-appid"
  secret: "your-secret"
